# 🎭 P42 — Gas Stipend Dependency
id: "P42"
name: "Gas Stipend Dependency"
severity: "medium"
enabled: true
category: "EXTERNAL_CALLS"
subcategory: "Gas Stipend Dependency"
difficulty: "easy"
requires_ast: false
exploitability_estimate: 0.35
description: >
  Using .send() or .transfer() for ETH transfers gives only 2300 gas to
  the recipient. This is often insufficient for modern smart contracts
  and can cause DoS. Recipients that need more gas (e.g., for logging,
  forwarding, or interacting with other contracts) will fail.
detectors:
  # ETH .send/.transfer take a SINGLE argument (the amount). ERC20
  # `token.transfer(to, amount)` takes TWO — matching that flagged every token
  # contract. Restrict to the single-argument (ETH value) form.
  - type: "regex"
    description: "Single-arg .send()/.transfer() for ETH (2300-gas stipend)"
    pattern: "\\.(send|transfer)\\s*\\(\\s*[^,)]+\\)"
    confidence: 0.80
    recommendation: "Use .call{value: amount}('') instead of .send() or .transfer(). The send/transfer 2300-gas pattern can cause DoS for contract recipients."
