# 🎯 P09 — No Input Validation
# Detects functions with dangerous parameters lacking validation
id: "P09"
name: "No Input Validation"
severity: "medium"
enabled: true
category: "BUSINESS_LOGIC"
subcategory: "Missing Input Validation"
difficulty: "easy"
requires_ast: false
exploitability_estimate: 0.30
description: >
  Unbounded iteration over caller-influenced collections can be exploited
  for gas griefing / denial of service (push-based loops over arrays whose
  length an attacker can grow).
detectors:
  # Kept: a genuine, specific signal. The two removed detectors flagged any
  # function with an array parameter (very common, not a vuln) and — via
  # inverted logic — functions that actually DID validate inputs (require/
  # revert present), which is exactly backwards. Together they produced ~440
  # findings across 85% of contracts.
  - type: "regex"
    description: "Unbounded array iteration (potential gas griefing / DoS)"
    pattern: "for\\s*\\([^)]*\\s*<\\s*\\w+\\.(length|balanceOf)\\b"
    confidence: 0.55
    recommendation: >
      Avoid iterating over unbounded arrays. Use pagination or
      pull-based withdrawal patterns instead of push-based loops.
