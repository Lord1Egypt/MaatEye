# 🛡️ P19 — No SafeERC20
# Detects direct ERC20 transfers without return value check
id: "P19"
name: "No SafeERC20"
severity: "medium"
enabled: true
category: "ERC_STANDARDS"
subcategory: "Missing SafeERC20"
difficulty: "easy"
requires_ast: false
exploitability_estimate: 0.50
description: >
  The contract uses direct transfer/transferFrom calls on ERC20
  tokens without checking the return value. Some tokens (USDT,
  BNB, etc.) don't return a boolean, causing silent failures.
detectors:
  # Match a CALL to ERC20 transfer/transferFrom — i.e. two+ arguments (note the
  # comma), so ETH's single-arg `.transfer(amount)` (P42's territory) and the
  # token's own `function transfer(` definition (no leading dot) are excluded.
  # The removed ast_pattern required only `.transfer(` anywhere, which flagged
  # every contract that moved any token or ETH.
  - type: "regex"
    description: "Raw ERC20 transfer/transferFrom call without SafeERC20"
    pattern: "\\.(transfer|transferFrom)\\s*\\(\\s*[^,)]+,[^)]*\\)"
    confidence: 0.55
    recommendation: >
      Use OpenZeppelin's SafeERC20 which handles non-standard tokens (USDT etc.
      don't return a bool). Replace token.transfer(to, amount) with
      SafeERC20.safeTransfer(token, to, amount).
