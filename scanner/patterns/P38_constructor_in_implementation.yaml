# 🎭 P38 — Constructor in Implementation
id: "P38"
name: "Constructor in Implementation"
severity: "high"
enabled: true
category: "PROXY_UPGRADEABLE"
subcategory: "Constructor in Implementation"
difficulty: "medium"
requires_ast: false
exploitability_estimate: 0.75
description: >
  A proxy implementation contract uses a constructor instead of an
  initializer function. Constructors run during implementation deployment,
  not during proxy initialization. State variables set in the constructor
  will not be set for the proxy, leading to uninitialized storage.
detectors:
  # Only flag when the contract is actually upgradeable/proxy-style (uses an
  # Initializable / initializer framework) AND still declares a constructor.
  # The previous detectors matched *every* contract with a constructor, which
  # flagged ~94% of all contracts — pure noise. ast_pattern requires BOTH
  # markers present and reports once per contract.
  - type: "ast_pattern"
    description: "Upgradeable contract declares a constructor (state set in a constructor is not applied to proxy instances)"
    required_elements:
      - "constructor"
      - "nitializ"   # matches Initializable / initializer / initialize
    forbidden_elements: []
    confidence: 0.60
    recommendation: "In upgradeable/proxy contracts, move state initialization into an initialize() function guarded by the 'initializer' modifier. Keep the constructor empty (or use it only for immutables and to lock the implementation via _disableInitializers())."
