name: ✨ New Pattern Proposal
description: Propose a new vulnerability detection pattern
title: "✨ [Pattern]: "
labels: ["pattern-proposal", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ New Pattern Proposal

  - type: input
    id: pattern_name
    attributes:
      label: Pattern Name
      description: Short, memorable name
      placeholder: "e.g., Unprotected Burn"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 🔴 Critical
        - 🟡 High
        - 🔵 Medium
        - 🟢 Low

  - type: textarea
    id: description
    attributes:
      label: Pattern Description
      description: What does this pattern detect?
    validations:
      required: true

  - type: textarea
    id: detection
    attributes:
      label: Detection Logic
      description: How would we detect this? (regex, AST, Slither rules)
      placeholder: |
        Look for:
        - function burn(uint256 amount) public
        - No onlyOwner modifier
        - _burn(msg.sender, amount)

  - type: textarea
    id: example
    attributes:
      label: Example Vulnerable Code
      description: Provide a Solidity example
      render: solidity

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to past incidents, articles, CVEs
